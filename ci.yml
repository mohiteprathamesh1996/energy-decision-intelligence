name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff mypy
      - run: ruff check src/ data/ app/ tests/ run.py
      - run: mypy src/ --ignore-missing-imports

  test:
    name: Unit Tests (no solver required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyomo numpy pandas scipy pyyaml pytest pytest-cov pytest-timeout
      - run: pytest tests/ -v --cov=src --cov-report=term-missing --timeout=60

  integration:
    name: Integration Test (with CBC solver)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install CBC
        run: sudo apt-get install -y coinor-cbc
      - run: pip install pyomo numpy pandas scipy pyyaml pytest pytest-timeout
      - run: pytest tests/test_integration.py -v --timeout=120

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t oil-optimizer:ci .
      - run: docker run --rm oil-optimizer:ci python run.py --mode base --horizon 7
